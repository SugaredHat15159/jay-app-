name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0) for manual builds'
        required: false
        default: '0.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Building version $v"

      - name: Stamp version into app
        shell: pwsh
        run: |
          (Get-Content app.py) -replace '__version__ = ".*"', "__version__ = `"${{ steps.ver.outputs.version }}`"" | Set-Content app.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download openWakeWord models
        run: python -c "import openwakeword.utils as u; u.download_models()"

      - name: Build exe (PyInstaller)
        run: pyinstaller jay-pc-agent.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.ver.outputs.version }} installer.iss'

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/JAY-PC-Agent-Setup.exe

      - name: Upload artifact (manual builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: JAY-PC-Agent-Setup
          path: Output/JAY-PC-Agent-Setup.exe
